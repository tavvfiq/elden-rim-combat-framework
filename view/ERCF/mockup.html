<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERCF Mockup</title>
  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1000px 420px at 20% 0%, rgba(130,170,255,0.35), transparent 60%),
        linear-gradient(180deg, rgba(35,40,85,0.75), rgba(12,16,33,0.9));
      pointer-events: none;
      min-height: 100vh;
    }

    .stack {
      position: absolute;
      left: 8px;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transform: translateZ(0);
    }

    .statusRow {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .statusIcon {
      width: 50px;
      height: 50px;
      border-radius: 5px;
      border: 2px solid rgba(70, 74, 58, 0.95);
      background:
        linear-gradient(140deg, rgba(255,255,255,0.15), rgba(255,255,255,0.03)),
        rgba(17, 21, 15, 0.9);
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.55),
        0 2px 6px rgba(0,0,0,0.5);
      position: relative;
      flex: 0 0 auto;
    }

    .statusIcon::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 3px;
      filter: saturate(1.25);
    }

    #poisonIcon::before {
      background: radial-gradient(circle at 35% 35%, #ffd54f 0%, #d6921a 42%, #8d5c10 100%);
    }

    #bleedIcon::before {
      background: radial-gradient(circle at 35% 35%, #ff6d6d 0%, #c72f2f 42%, #6e1717 100%);
    }

    #frostIcon::before {
      background: radial-gradient(circle at 35% 35%, #a8e6ff 0%, #4db2dc 42%, #23607a 100%);
    }

    #magicIcon::before {
      background: radial-gradient(circle at 35% 35%, #f3f6ff 0%, #b4bce9 42%, #6a729f 100%);
    }

    #rotIcon::before {
      background: radial-gradient(circle at 35% 35%, #ff8860 0%, #de4c1d 42%, #7e280f 100%);
    }

    #ashIcon::before {
      background: radial-gradient(circle at 35% 35%, #9aa1aa 0%, #666f79 42%, #2f3941 100%);
    }

    .slotIcon::before {
      background: radial-gradient(circle at 35% 35%, #7f8a96 0%, #5a6069 42%, #31363d 100%);
    }

    .barOuter {
      position: relative;
      width: 640px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid rgba(134, 130, 110, 0.95);
      background: rgba(0,0,0,0.88);
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.5);
    }

    .barFill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      transition: width 180ms ease;
      border-radius: 2px;
      opacity: 0.9;
      overflow: hidden;
    }

    /* Status-specific fills closer to the reference. */
    #ashFill {
      background: linear-gradient(90deg, #5a5f66 0%, #9ea4ad 100%);
    }
    #bleedFill {
      background: linear-gradient(90deg, #a81818 0%, #ea2f2f 100%);
    }
    #poisonFill {
      background: linear-gradient(90deg, #a36f0f 0%, #d9a11f 100%);
    }
    #magicFill {
      background: linear-gradient(90deg, #7f8ee6 0%, #b8c0ff 100%);
    }
    #frostFill {
      background: linear-gradient(90deg, #2f92ca 0%, #4fc6ff 100%);
    }
    #rotFill {
      background: linear-gradient(90deg, #c54712 0%, #eb671c 100%);
    }

    .barOuter::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      border-radius: 2px;
      border: 1px solid rgba(16,16,16,0.8);
      pointer-events: none;
    }

    .tail {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 34%;
      background: rgba(0,0,0,0.92);
      border-left: 2px solid rgba(150,145,125,0.75);
      box-sizing: border-box;
    }

    /* Keep preview usable on smaller windows. */
    @media (max-width: 1000px) {
      .barOuter { width: 520px; }
    }
  </style>
</head>
<body>
  <div class="stack">
    <div class="statusRow" id="ashRow">
      <div class="statusIcon" id="ashIcon" aria-label="Ash"></div>
      <div class="barOuter">
        <div class="barFill" id="ashFill"></div>
        <div class="tail"></div>
      </div>
    </div>

    <div class="statusRow" id="bleedRow">
      <div class="statusIcon" id="bleedIcon" aria-label="Bleed"></div>
      <div class="barOuter">
        <div class="barFill" id="bleedFill"></div>
        <div class="tail"></div>
      </div>
    </div>

    <div class="statusRow" id="poisonRow">
      <div class="statusIcon" id="poisonIcon" aria-label="Poison"></div>
      <div class="barOuter">
        <div class="barFill" id="poisonFill"></div>
        <div class="tail"></div>
      </div>
    </div>

    <div class="statusRow" id="magicRow">
      <div class="statusIcon" id="magicIcon" aria-label="Magic"></div>
      <div class="barOuter">
        <div class="barFill" id="magicFill"></div>
        <div class="tail"></div>
      </div>
    </div>

    <div class="statusRow" id="frostRow">
      <div class="statusIcon" id="frostIcon" aria-label="Frost"></div>
      <div class="barOuter">
        <div class="barFill" id="frostFill"></div>
        <div class="tail"></div>
      </div>
    </div>

    <div class="statusRow" id="rotRow">
      <div class="statusIcon" id="rotIcon" aria-label="Rot"></div>
      <div class="barOuter">
        <div class="barFill" id="rotFill"></div>
        <div class="tail"></div>
      </div>
    </div>
  </div>

  <script>
    const clamp01 = (x) => Math.max(0, Math.min(1, x));
    const meterSet = (fillEl, value, maxValue = 100) => {
      const v = Number(value) || 0;
      const t = clamp01(v / maxValue);
      fillEl.style.width = (t * 100).toFixed(1) + '%';
      fillEl.style.opacity = (t > 0 ? 1 : 0.2);
    };

    // PrismaUI interop calls (functionName => string argument).
    window.setPoisonMeter = (arg) => {
      meterSet(document.getElementById('poisonFill'), arg);
    };
    window.setBleedMeter = (arg) => {
      meterSet(document.getElementById('bleedFill'), arg);
    };

    // Mock-only extra rows (not part of v1 runtime interop).
    const setMock = (id, value) => meterSet(document.getElementById(id), value);

    // Mockup data: preload the meters with sample values so the page is
    // immediately representative without the SKSE plugin running.
    const mockSequence = [
      { ash: 58, bleed: 64, poison: 52, magic: 98, frost: 78, rot: 71 },
      { ash: 62, bleed: 68, poison: 55, magic: 95, frost: 74, rot: 66 },
      { ash: 54, bleed: 52, poison: 48, magic: 100, frost: 81, rot: 69 }
    ];

    let i = 0;
    const applyStep = () => {
      const step = mockSequence[i];
      setMock('ashFill', step.ash);
      window.setBleedMeter(String(step.bleed));
      window.setPoisonMeter(String(step.poison));
      setMock('magicFill', step.magic);
      setMock('frostFill', step.frost);
      setMock('rotFill', step.rot);
      i = (i + 1) % mockSequence.length;
    };

    // Apply immediately, then animate slowly.
    applyStep();
    setInterval(applyStep, 1200);
  </script>
</body>
</html>
